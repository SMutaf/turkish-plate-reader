# Örnek yapılandırma. Kopyalayın: cp config.example.yaml config.yaml
# Sunucu başlarken config.yaml varsa okur, yoksa varsayılanlarla çalışır.
# Öncelik sırası: CLI > ortam değişkeni (PLATE_*) > config.yaml > varsayılan

server:
  host: 127.0.0.1
  port: 8000
  # ZORUNLU: uvicorn --workers 1 ile çalıştırın.
  # Çoklu worker model belleğini KOPYALAR; 4 GB kartta (GTX 1650) belleği taşırır.
  workers: 1

  max_upload_mb: 10          # POST /v1/infer dosya limiti (aşılırsa HTTP 413)

  # --- çıkarım ---
  vehicle_conf: 0.35         # araç tespit güven eşiği (COCO yolov8n)
  plate_conf: 0.25           # plaka tespit güven eşiği (weights/best.pt)
  ocr_min_conf: 0.0          # bu OCR güveninin altındaki okuma valid sayılmaz
  vote_window: 8             # track başına saklanan son okuma sayısı (deque)
  track_max_age: 5.0         # saniye; bu süre görülmeyen track bellekten silinir
  max_cameras: 4             # eşzamanlı kamera (her biri AYRI tracker/model)
  max_ocr_per_frame: 3       # kare başına en fazla OCR çağrısı (GPU koruması)

  vehicle_weights: yolov8n.pt        # COCO ağırlıkları (yeni eğitim yok)
  plate_weights: weights/best.pt     # Aşama 1'de eğitilen plaka modeli

# İstemci ayarları BİLGİ AMAÇLIDIR: camera_client.py bunları komut satırından
# alır (istemcide yaml bağımlılığı yoktur). Örnek:
#   python client/camera_client.py --server http://127.0.0.1:8000 \
#       --camera-id kapi1 --source 0 --fps 5 --jpeg-quality 85
client:
  server_url: http://127.0.0.1:8000
  camera_id: kapi1
  target_fps: 5
  jpeg_quality: 85
